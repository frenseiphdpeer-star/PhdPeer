name: SaaS CI/CD

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

concurrency:
  group: ci-cd-main
  cancel-in-progress: false

jobs:
  lint-and-test-backend:
    name: Backend Lint + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies and lint tools
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8 black mypy pytest

      - name: Lint backend (non-blocking)
        continue-on-error: true
        run: |
          cd backend
          flake8 app
          black --check app
          mypy app

      - name: Run backend tests
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "False"
          ENVIRONMENT: test
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          pytest -q

  lint-and-test-frontend:
    name: Frontend Lint + Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend (non-blocking)
        continue-on-error: true
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  build-and-push-images:
    name: Build + Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - lint-and-test-backend
      - lint-and-test-frontend
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.backend.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.frontend.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push-images
    environment: staging

    steps:
      - name: Deploy by image tag (staging) with rollback
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build-and-push-images.outputs.image_tag }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          BACKEND_HEALTH_URL: ${{ secrets.STAGING_BACKEND_HEALTH_URL }}
          FRONTEND_HEALTH_URL: ${{ secrets.STAGING_FRONTEND_HEALTH_URL }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          envs: IMAGE_TAG,BACKEND_IMAGE,FRONTEND_IMAGE,DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN,BACKEND_HEALTH_URL,FRONTEND_HEALTH_URL
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            PREV_BACKEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' phd_timeline_backend_prod 2>/dev/null || true)"
            PREV_FRONTEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' phd_timeline_frontend_prod 2>/dev/null || true)"

            NEW_BACKEND_IMAGE="${BACKEND_IMAGE}:${IMAGE_TAG}"
            NEW_FRONTEND_IMAGE="${FRONTEND_IMAGE}:${IMAGE_TAG}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$NEW_BACKEND_IMAGE"
            docker pull "$NEW_FRONTEND_IMAGE"

            cat > /tmp/compose.override.ci.yml <<EOF
            services:
              backend:
                image: ${NEW_BACKEND_IMAGE}
              frontend:
                image: ${NEW_FRONTEND_IMAGE}
            EOF

            docker compose -f infra/docker-compose.prod.yml -f /tmp/compose.override.ci.yml run --rm backend alembic upgrade head
            docker compose -f infra/docker-compose.prod.yml -f /tmp/compose.override.ci.yml up -d backend frontend

            HEALTH_OK=1
            for i in $(seq 1 20); do
              if curl -fsS "$BACKEND_HEALTH_URL" >/dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then HEALTH_OK=0; fi
              sleep 3
            done

            if [ "$HEALTH_OK" -eq 1 ]; then
              for i in $(seq 1 20); do
                if curl -fsS "$FRONTEND_HEALTH_URL" >/dev/null; then
                  break
                fi
                if [ "$i" -eq 20 ]; then HEALTH_OK=0; fi
                sleep 3
              done
            fi

            if [ "$HEALTH_OK" -ne 1 ]; then
              if [ -n "$PREV_BACKEND_IMAGE" ] && [ -n "$PREV_FRONTEND_IMAGE" ]; then
                cat > /tmp/compose.rollback.ci.yml <<EOF
                services:
                  backend:
                    image: ${PREV_BACKEND_IMAGE}
                  frontend:
                    image: ${PREV_FRONTEND_IMAGE}
                EOF
                docker compose -f infra/docker-compose.prod.yml -f /tmp/compose.rollback.ci.yml up -d backend frontend
              fi
              exit 1
            fi

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - build-and-push-images
      - deploy-staging
    environment: production

    steps:
      - name: Deploy by image tag (production) with rollback
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build-and-push-images.outputs.image_tag }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          BACKEND_HEALTH_URL: ${{ secrets.PROD_BACKEND_HEALTH_URL }}
          FRONTEND_HEALTH_URL: ${{ secrets.PROD_FRONTEND_HEALTH_URL }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          envs: IMAGE_TAG,BACKEND_IMAGE,FRONTEND_IMAGE,DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN,BACKEND_HEALTH_URL,FRONTEND_HEALTH_URL
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            PREV_BACKEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' phd_timeline_backend_prod 2>/dev/null || true)"
            PREV_FRONTEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' phd_timeline_frontend_prod 2>/dev/null || true)"

            NEW_BACKEND_IMAGE="${BACKEND_IMAGE}:${IMAGE_TAG}"
            NEW_FRONTEND_IMAGE="${FRONTEND_IMAGE}:${IMAGE_TAG}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$NEW_BACKEND_IMAGE"
            docker pull "$NEW_FRONTEND_IMAGE"

            cat > /tmp/compose.override.ci.yml <<EOF
            services:
              backend:
                image: ${NEW_BACKEND_IMAGE}
              frontend:
                image: ${NEW_FRONTEND_IMAGE}
            EOF

            docker compose -f infra/docker-compose.prod.yml -f /tmp/compose.override.ci.yml run --rm backend alembic upgrade head
            docker compose -f infra/docker-compose.prod.yml -f /tmp/compose.override.ci.yml up -d backend frontend

            HEALTH_OK=1
            for i in $(seq 1 20); do
              if curl -fsS "$BACKEND_HEALTH_URL" >/dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then HEALTH_OK=0; fi
              sleep 3
            done

            if [ "$HEALTH_OK" -eq 1 ]; then
              for i in $(seq 1 20); do
                if curl -fsS "$FRONTEND_HEALTH_URL" >/dev/null; then
                  break
                fi
                if [ "$i" -eq 20 ]; then HEALTH_OK=0; fi
                sleep 3
              done
            fi

            if [ "$HEALTH_OK" -ne 1 ]; then
              if [ -n "$PREV_BACKEND_IMAGE" ] && [ -n "$PREV_FRONTEND_IMAGE" ]; then
                cat > /tmp/compose.rollback.ci.yml <<EOF
                services:
                  backend:
                    image: ${PREV_BACKEND_IMAGE}
                  frontend:
                    image: ${PREV_FRONTEND_IMAGE}
                EOF
                docker compose -f infra/docker-compose.prod.yml -f /tmp/compose.rollback.ci.yml up -d backend frontend
              fi
              exit 1
            fi
